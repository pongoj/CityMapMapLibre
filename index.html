.table-scroll {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        overflow: auto; /* vertical + horizontal */
        max-height: 360px; /* only the table area scrolls */
        background: #fff;
      }
.table-scroll thead th{ background: #fff; }
.filter-table {
        border-collapse: collapse;
        width: max-content; /* allow horizontal scroll when needed */
        min-width: 100%;
      }
.filter-table th,
      .filter-table td {
        border: 1px solid #e5e7eb;
        padding: 8px 10px;
        font-size: 14px;
        vertical-align: top;
        white-space: nowrap; /* horizontal scroll instead of wrapping */
        background: #fff;
      }
      .filter-table thead th {
        position: sticky;
        top: 0;
        z-index: 2;
        background: #f9fafb;
      }
/* Mobil helytakarékosság: kisebb fejléc */
      #filterModal .filter-table thead th{
        padding: 4px 8px;
        font-size: 13px;
      }
      #filterModal .filter-table thead th .ico{ width:16px; height:16px; }

        display:none;

      #filterModal .th-filter-pop select{

	.filter-table tbody tr{ cursor: pointer; }
